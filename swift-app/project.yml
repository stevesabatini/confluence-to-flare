name: ConfluenceToFlare
options:
  bundleIdPrefix: com.confluencetoflare
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.6.0"

targets:
  ConfluenceToFlare:
    type: application
    platform: macOS
    sources:
      - path: ConfluenceToFlare
        excludes:
          - "*.entitlements"
    resources:
      - path: ConfluenceToFlare/Resources/release_note_template.htm
    dependencies:
      - package: SwiftSoup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.confluencetoflare.app
        PRODUCT_NAME: Confluence To Flare
        PRODUCT_MODULE_NAME: ConfluenceToFlare
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_CFBundleDisplayName: "Confluence To Flare"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: ConfluenceToFlare/ConfluenceToFlare.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: true

  ConfluenceToFlareTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ConfluenceToFlareTests
    dependencies:
      - target: ConfluenceToFlare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.confluencetoflare.tests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Confluence To Flare.app/Contents/MacOS/Confluence To Flare"
        BUNDLE_LOADER: "$(TEST_HOST)"
